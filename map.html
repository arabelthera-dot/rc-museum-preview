<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Русская цивилизация — город-музей</title>
<style>
  :root{--gold:#c8a24a;--gold-l:#e7c877;--navy:#0b1a30;--ink:#eaf1fb}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#07101f;font-family:'Segoe UI',Roboto,sans-serif;color:var(--ink);-webkit-tap-highlight-color:transparent}
  #scene{position:fixed;inset:0;display:block;touch-action:none}
  #vig{position:fixed;inset:0;z-index:12;pointer-events:none;background:radial-gradient(ellipse 72% 62% at 50% 47%,transparent 42%,rgba(4,8,14,.6) 100%)}
  /* --- загрузка --- */
  #load{position:fixed;inset:0;background:radial-gradient(circle at 50% 40%,#12294a,#07101f 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:40;transition:opacity .8s}
  #load.gone{opacity:0;pointer-events:none}
  #load .seal{width:74px;height:74px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#f6e3a3,#cba53f 60%,#a07c1f);border:2px solid #7a5d13;display:flex;align-items:center;justify-content:center;font-size:30px;color:#5a4409;box-shadow:0 0 40px rgba(201,168,76,.5);animation:pulse 1.6s ease-in-out infinite}
  #load p{margin-top:18px;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);opacity:.8}
  @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 30px rgba(201,168,76,.4)}50%{transform:scale(1.08);box-shadow:0 0 55px rgba(201,168,76,.7)}}
  /* --- шапка-бренд --- */
  #brand{position:fixed;top:0;left:0;right:0;z-index:20;text-align:center;padding:26px 20px 40px;pointer-events:none;
    background:linear-gradient(#07101f 5%,rgba(7,16,31,.55) 45%,transparent)}
  #brand .name{font-family:'Playfair Display',Georgia,serif;font-size:clamp(22px,6.4vw,34px);font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#fff;text-shadow:0 2px 24px rgba(0,0,0,.6)}
  #brand .desc{margin-top:6px;font-size:clamp(9px,2.6vw,12px);letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
  #brand .slg{margin-top:12px;font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:clamp(12px,3.4vw,16px);color:#dfe9f7;opacity:.92;text-shadow:0 1px 12px rgba(0,0,0,.7)}
  /* --- метки павильонов --- */
  .lbl{position:fixed;transform:translate(-50%,-100%);z-index:15;pointer-events:none;transition:opacity .3s;will-change:transform,left,top}
  .lbl .pin{display:flex;flex-direction:column;align-items:center;gap:4px}
  .lbl .tag{background:rgba(9,14,22,.86);border:1px solid rgba(200,190,170,.2);backdrop-filter:blur(5px);border-radius:3px;padding:5px 12px;font-size:12px;font-weight:500;letter-spacing:.4px;white-space:nowrap;color:#e6ebf2;box-shadow:0 3px 14px rgba(0,0,0,.45)}
  .lbl.open .tag{color:#ece0c6;border-color:rgba(168,138,72,.55);border-bottom:2px solid var(--gold)}
  .lbl .sub{font-size:8.5px;letter-spacing:2px;text-transform:uppercase;opacity:.55}
  .lbl .dot{display:none}
  .lbl.open .dot{display:none}
  /* --- нижняя подсказка / статус --- */
  #hint{position:fixed;bottom:22px;left:0;right:0;z-index:20;text-align:center;font-size:12.5px;color:#aeb9c9;pointer-events:none;transition:opacity .5s}
  #hint b{color:var(--gold-l)}
  #count{position:fixed;top:0;right:0;z-index:21;margin:16px;font-size:11px;letter-spacing:1px;color:var(--gold);background:rgba(11,26,48,.6);border:1px solid rgba(201,168,76,.3);border-radius:20px;padding:6px 12px;backdrop-filter:blur(6px)}
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div id="vig"></div>

<div id="brand">
  <div class="name">Русская цивилизация</div>
  <div class="desc">Первый цифровой музей достижений России</div>
  <div class="slg">«Цивилизация первенств — что Россия дала миру раньше всех»</div>
</div>
<div id="count">★ 1 из 8 музеев открыт</div>
<div id="hint">Нажми на <b>светящийся павильон</b>, чтобы войти · двигай экран — город оживает</div>

<div id="load"><div class="seal">★</div><p>Город просыпается…</p></div>

<script src="assets/vendor/gsap.min.js"></script>
<script type="importmap">
{ "imports": { "three": "./assets/vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const GOLD=0xa88a48, GOLDL=0xc0a25c;
const cv=document.getElementById('scene');
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x121a26,0.02);

const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.1,200);

// ——— освещение: закатный тёплый свет ———
scene.add(new THREE.HemisphereLight(0x9ab2ce,0x1c2632,0.72));
const sun=new THREE.DirectionalLight(0xf0ead8,1.35);
sun.position.set(-14,20,10); sun.castShadow=true;
const rim=new THREE.DirectionalLight(0x9ab4d6,0.7); rim.position.set(12,9,-16); scene.add(rim);
sun.shadow.mapSize.set(1024,1024); sun.shadow.camera.near=1; sun.shadow.camera.far=70;
sun.shadow.camera.left=-30;sun.shadow.camera.right=30;sun.shadow.camera.top=30;sun.shadow.camera.bottom=-30;
scene.add(sun);
const warm=new THREE.PointLight(0xf3cd88,0.8,55); warm.position.set(0,5,-1); scene.add(warm);

const city=new THREE.Group(); scene.add(city);

// ——— небо (градиентный купол) ———
const skyGeo=new THREE.SphereGeometry(120,32,16);
const skyMat=new THREE.ShaderMaterial({side:THREE.BackSide,uniforms:{top:{value:new THREE.Color(0x0a1320)},bot:{value:new THREE.Color(0x1e2a38)}},
  vertexShader:`varying vec3 p;void main(){p=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`varying vec3 p;uniform vec3 top;uniform vec3 bot;void main(){float h=normalize(p).y*.5+.5;gl_FragColor=vec4(mix(bot,top,smoothstep(.1,.75,h)),1.);}`});
scene.add(new THREE.Mesh(skyGeo,skyMat));

// ——— земля: холмистая ———
const gGeo=new THREE.PlaneGeometry(80,80,60,60);
gGeo.rotateX(-Math.PI/2);
const pos=gGeo.attributes.position;
for(let i=0;i<pos.count;i++){const x=pos.getX(i),z=pos.getZ(i);const d=Math.sqrt(x*x+z*z);
  let y=Math.sin(x*0.18)*Math.cos(z*0.16)*1.4 + Math.sin(d*0.4)*0.3;
  if(d<9)y*=0.15; // ровная площадка под город
  pos.setY(i,y);}
gGeo.computeVertexNormals();
const ground=new THREE.Mesh(gGeo,new THREE.MeshStandardMaterial({color:0x323d38,roughness:1,flatShading:true}));
ground.receiveShadow=true; city.add(ground);

// ——— река ———
const rGeo=new THREE.PlaneGeometry(90,10,90,1); rGeo.rotateX(-Math.PI/2);
const rp=rGeo.attributes.position;
for(let i=0;i<rp.count;i++){const x=rp.getX(i);rp.setZ(i,rp.getZ(i)+Math.sin(x*0.14)*7);}
const river=new THREE.Mesh(rGeo,new THREE.MeshStandardMaterial({color:0x33556c,roughness:0.2,metalness:0.85,emissive:0x0e2130,emissiveIntensity:0.55}));
river.position.set(0,0.08,9); city.add(river);

// ——— строитель зданий ———
function palata(w,h,d,color){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({color,roughness:.85,flatShading:true}));
  body.position.y=h/2; body.castShadow=true; body.receiveShadow=true; g.add(body);
  const roof=new THREE.Mesh(new THREE.ConeGeometry(w*0.82,h*0.7,4),new THREE.MeshStandardMaterial({color:0x374039,roughness:.9,flatShading:true}));
  roof.position.y=h+h*0.33; roof.rotation.y=Math.PI/4; roof.castShadow=true; g.add(roof);
  return g;
}
// ——— кремль в сердце ———
const kremlin=new THREE.Group();
for(let i=0;i<5;i++){const a=i/5*Math.PI*2;const t=palata(1.5,3.5,1.5,0xd8d2c4);
  t.position.set(Math.cos(a)*3.2,0,Math.sin(a)*3.2);
  const dome=new THREE.Mesh(new THREE.SphereGeometry(0.6,16,16),new THREE.MeshStandardMaterial({color:GOLD,metalness:.6,roughness:.5,emissive:0x241a06}));
  dome.position.y=4.8; t.add(dome); kremlin.add(t);}
const center=palata(2.4,4.6,2.4,0xe0dacc);
const bigDome=new THREE.Mesh(new THREE.SphereGeometry(1,20,20),new THREE.MeshStandardMaterial({color:GOLDL,metalness:.65,roughness:.45,emissive:0x2a2008,emissiveIntensity:.3}));
bigDome.position.y=6.2; center.add(bigDome); kremlin.add(center);
kremlin.position.set(0,0,-1); city.add(kremlin);

// ——— павильоны-музеи по «улицам» ———
const MUSEUMS=[
  {n:'Изобретения',s:'открыт',open:true,link:'izobreteniya/index.html',a:0.2,r:12},
  {n:'Русское искусство',s:'скоро',a:0.95,r:13},
  {n:'Космос',s:'скоро',a:1.7,r:12},
  {n:'Военная слава',s:'скоро',a:2.5,r:13},
  {n:'Литература',s:'скоро',a:3.4,r:12},
  {n:'Архитектура',s:'скоро',a:4.2,r:13},
  {n:'Ремёсла',s:'скоро',a:5.0,r:12},
  {n:'Спорт',s:'скоро',a:5.75,r:13},
];
const glowTex=(()=>{const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');
  const g=x.createRadialGradient(64,64,0,64,64,64);g.addColorStop(0,'rgba(255,220,140,.9)');g.addColorStop(.4,'rgba(230,180,90,.4)');g.addColorStop(1,'rgba(230,180,90,0)');
  x.fillStyle=g;x.fillRect(0,0,128,128);return new THREE.CanvasTexture(c);})();

// сияние над кремлём
const kglow=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,color:0xbfa877,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthWrite:false}));
kglow.scale.set(11,11,1); kglow.position.set(0,6.5,-1); city.add(kglow);

const pavilions=[];
MUSEUMS.forEach((m,i)=>{
  const R=m.r*0.72;
  const x=Math.cos(m.a)*R, z=Math.sin(m.a)*R;
  const col=m.open?0xd7d1c3:0x434852;
  const b=palata(2+Math.random()*.6,2.4+Math.random()*1.2,2+Math.random()*.6,col);
  b.position.set(x,0,z);
  // улица-луч от кремля к павильону
  const road=new THREE.Mesh(new THREE.BoxGeometry(R,0.05,0.7),new THREE.MeshBasicMaterial({color:m.open?0x93824e:0x59554a,transparent:true,opacity:m.open?0.4:0.16}));
  road.position.set(x/2,0.07,z/2); road.rotation.y=-m.a; city.add(road);
  if(m.open){
    const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,color:0xc9b184,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
    glow.scale.set(6,6,1); glow.position.set(x,2.6,z); city.add(glow); b.userData.glow=glow;
  } else {
    // «леса» — тонкий каркас у закрытого
    const edges=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(3,4,3)),new THREE.LineBasicMaterial({color:0x8a7a55,transparent:true,opacity:.5}));
    edges.position.set(x,2,z); city.add(edges);
  }
  b.userData.museum=m; city.add(b); pavilions.push(b);
  // HTML-метка
  const el=document.createElement('div'); el.className='lbl'+(m.open?' open':'');
  el.innerHTML=`<div class="pin"><div class="tag">${m.n}</div><div class="sub">${m.open?'★ открыт':'скоро'}</div><div class="dot"></div></div>`;
  document.body.appendChild(el); m._el=el; m._pos=new THREE.Vector3(x,5.4,z);
  if(m.open&&m.link){el.style.pointerEvents='auto';el.style.cursor='pointer';el.onclick=()=>go(m);}
});

// ——— светлячки/искры над городом ———
const N=130, pg=new THREE.BufferGeometry(), pa=new Float32Array(N*3);
for(let i=0;i<N;i++){pa[i*3]=(Math.random()-.5)*44;pa[i*3+1]=Math.random()*16;pa[i*3+2]=(Math.random()-.5)*44;}
pg.setAttribute('position',new THREE.BufferAttribute(pa,3));
const spark=new THREE.Points(pg,new THREE.PointsMaterial({color:0xa8b6c8,size:0.075,transparent:true,opacity:.3,blending:THREE.AdditiveBlending,depthWrite:false}));
scene.add(spark);

// ——— камера: интро-облёт + параллакс ———
let px=0,py=0;
camera.position.set(0,44,46); camera.lookAt(0,2,0);
let introDone=false;
setTimeout(()=>{document.getElementById('load').classList.add('gone');introDone=true;},2600);

addEventListener('pointermove',e=>{px=(e.clientX/innerWidth-.5);py=(e.clientY/innerHeight-.5);});
addEventListener('deviceorientation',e=>{if(e.gamma!=null){px=Math.max(-1,Math.min(1,e.gamma/40));py=Math.max(-1,Math.min(1,(e.beta-45)/40));}});

// ——— проекция меток ———
const v=new THREE.Vector3();
function projectLabels(){
  MUSEUMS.forEach(m=>{
    v.copy(m._pos); city.localToWorld(v); v.project(camera);
    const vis=v.z<1;
    m._el.style.opacity=vis?1:0;
    if(vis){m._el.style.left=(v.x*.5+.5)*innerWidth+'px'; m._el.style.top=(-v.y*.5+.5)*innerHeight+'px';}
  });
}

// ——— интерактив ———
const ray=new THREE.Raycaster(), m2=new THREE.Vector2();
let hovered=null;
function pick(cx,cy){m2.set(cx/innerWidth*2-1,-(cy/innerHeight)*2+1);ray.setFromCamera(m2,camera);
  const hit=ray.intersectObjects(pavilions,true);
  return hit.length?hit[0].object.parent.userData.museum||hit[0].object.userData.museum:null;}
function go(m){if(!m||!m.link)return;const l=document.getElementById('load');l.querySelector('p').textContent='Входим в музей…';l.classList.remove('gone');location.assign(m.link);}
addEventListener('click',e=>{const m=pick(e.clientX,e.clientY);if(m&&m.open)go(m);});

// ——— цикл ———
let t=0;
function loop(){requestAnimationFrame(loop);t+=0.016;
  // параллакс камеры
  const tx=px*7, ty=35 - py*4;
  camera.position.x+=(tx-camera.position.x)*0.05;
  camera.position.y+=(ty-camera.position.y)*0.05;
  camera.position.z+=(19-camera.position.z)*0.05;
  camera.lookAt(0,2.5,0);
  // река/искры дышат
  city.children.forEach(()=>{});
  const sp=spark.geometry.attributes.position;
  for(let i=0;i<N;i++){let y=sp.getY(i)+0.004;if(y>16)y=0;sp.setY(i,y);}
  sp.needsUpdate=true;
  spark.rotation.y=t*0.015;
  // свечение открытого — сдержанная пульсация
  pavilions.forEach(p=>{if(p.userData.glow)p.userData.glow.material.opacity=0.36+Math.sin(t*1.3)*0.1;});
  bigDome.rotation.y=t*0.3;
  projectLabels();
  renderer.render(scene,camera);
}
loop();

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
renderer.setSize(innerWidth,innerHeight);
</script>
</body>
</html>
