<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Котельников — первый в мире ранцевый парашют</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #05050a;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
  }
  .top {
    background: linear-gradient(180deg, #0f0f18 0%, #05050a 100%);
    padding: 22px 16px 16px;
    text-align: center;
    border-bottom: 1px solid #1a1a2e;
  }
  .kicker {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c8a24a;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .top h1 {
    font-family: Georgia, serif;
    font-size: clamp(20px, 5vw, 30px);
    line-height: 1.2;
    color: #fff;
  }
  .top p {
    font-size: 14px;
    color: #888;
    margin-top: 6px;
  }
  .player-wrap {
    position: relative;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 16px 12px;
  }
  video {
    width: 100%;
    border-radius: 10px;
    display: block;
    background: #000;
    box-shadow: 0 8px 40px rgba(0,0,0,0.8);
  }
  .meta {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px 16px 40px;
  }
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 12px;
  }
  .tl-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    cursor: pointer;
    padding: 8px 10px;
    border-radius: 8px;
    transition: background .15s;
  }
  .tl-item:hover { background: #111122; }
  .tl-time {
    font-size: 12px;
    color: #c8a24a;
    font-weight: 700;
    white-space: nowrap;
    padding-top: 2px;
    min-width: 40px;
  }
  .tl-text { font-size: 14px; color: #ccc; line-height: 1.4; }
  .tl-text b { color: #fff; }
  .share-btn {
    display: block;
    width: calc(100% - 24px);
    max-width: 696px;
    margin: 0 auto 16px;
    padding: 14px;
    background: linear-gradient(135deg, #c8a24a, #a07830);
    color: #000;
    font-weight: 700;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
  }
  .label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555;
    margin: 16px 0 8px;
  }
</style>
</head>
<body>
<div class="top">
  <div class="kicker">Виртуальный музей · Что изобрели русские первыми в мире</div>
  <h1>Первый в мире ранцевый парашют</h1>
  <p>Глеб Котельников · 30 января · 53 секунды</p>
</div>

<div class="player-wrap">
  <video
    id="vid"
    controls
    playsinline
    preload="metadata"
    poster="">
    <source src="kotelnikov-film.mp4" type="video/mp4">
    Ваш браузер не поддерживает видео. Обновите браузер.
  </video>
</div>

<div class="meta">
  <div class="label">Что в ролике</div>
  <div class="timeline" id="tl"></div>

  <div class="label" style="margin-top:24px">Полная история</div>
  <a class="share-btn" href="day-kotelnikov.html">
    Открыть страницу дня →
  </a>
</div>

<script>
const vid = document.getElementById('vid');
const tl  = document.getElementById('tl');
const chapters = [
  [0,  "ХУК", "Вещь, которая спасла 100 000 жизней — началась с дамского платка"],
  [5,  "УДАР", "Актёр. Не инженер."],
  [8,  "ИСТОРИЯ", "1910. Петербург. Гибель лётчика. Котельников решает — спасение должно быть на самом человеке"],
  [17, "ИСПЫТАНИЯ", "Манекен «Иван Иванович». 1912 год — купол раскрылся безупречно"],
  [26, "РК-1", "Первый в мире ранцевый парашют свободного действия"],
  [34, "ГОРЕЧЬ", "Дома отвергли. Патент — во Франции. Но весь мир летит с его парашютом"],
  [40, "ИТОГ", "Русский. Первый в мире. 30 января 1872."],
  [45, "ПРИЗЫВ", "365 историй первенства России · Виртуальный музей"],
];

chapters.forEach(([sec, tag, text]) => {
  const item = document.createElement('div');
  item.className = 'tl-item';
  item.innerHTML = `<span class="tl-time">${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}</span>
    <div class="tl-text"><b>${tag}</b> — ${text}</div>`;
  item.onclick = () => { vid.currentTime = sec; vid.play(); };
  tl.appendChild(item);
});
</script>
</body>
</html>
